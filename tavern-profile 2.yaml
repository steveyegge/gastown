# Gas Town — Project Profile
# ==========================
# The multi-agent workspace orchestrator.

id: project-gastown
name: "Gas Town"
description: |
  Multi-agent workspace manager for AI-assisted software development.
  Orchestrates Claude Code sessions (and other LLM runtimes) as persistent
  agents with roles, work tracking, messaging, and autonomous execution.
  Local-first, git-native, runs on a single developer machine.
repo: github.com/steveyegge/gastown
created_at: 2025-01-01T00:00:00Z
updated_at: 2026-03-03T00:00:00Z
contributed_by: jeremy
contributed_by_type: overseer

facets:
  platform: cli
  languages: [go]
  frameworks: [cobra]
  runtime: go-1.25
  build_system: make
  package_manager: go-modules

architecture:
  style: monolith
  components:
    - cmd/gt              # Main CLI entry point
    - internal/cmd        # 350+ command handlers
    - internal/config     # Town, rig, agent configuration
    - internal/daemon     # Background service (rig patrol, health)
    - internal/mayor      # Global coordinator agent
    - internal/deacon     # System watchdog + infrastructure dogs
    - internal/polecat    # Ephemeral worker agent lifecycle
    - internal/convoy     # Work batching and tracking
    - internal/mail       # Agent-to-agent messaging
    - internal/beads      # Issue tracking integration (Dolt-backed)
    - internal/hooks      # Git worktree-based persistent work queues
    - internal/witness    # Per-rig polecat lifecycle manager
    - internal/refinery   # Merge queue processor
    - internal/scheduler  # Capacity-based work dispatch
    - internal/molecule   # Multi-step workflow definitions
    - internal/formula    # TOML-based workflow templates
    - internal/dog        # Deacon infrastructure helpers
    - internal/protocol   # Agent communication protocols
    - internal/rig        # Rig management and configuration
  data_stores: [dolt, sqlite]
  protocols: [grpc, cli]
  deployment: local-binary
  ci_cd: github-actions

security:
  auth_method: none        # Local tool, no network auth
  encryption: none         # Data at rest not encrypted (local machine)
  multi_tenant: false
  sensitive_data: []
  compliance: []

quality:
  test_framework: go-test
  linter: golangci-lint
  type_checking: go-native # Go's static type system
  coverage_target: null

constraints:
  must_use: [go, cobra, dolt, beads, toml]
  must_avoid: []
  budget: null
  timeline: null
  team_size: null          # 1 human + N agents

needs:
  - "Reliable Dolt server lifecycle management"
  - "Agent session persistence across context compaction"
  - "Cross-rig work dispatch and dependency tracking"
  - "Formula-driven autonomous workflow execution"

context: |
  Gas Town is a local-first tool — no cloud, no server beyond the Dolt
  SQL process on localhost:3307. The primary user is a single developer
  (the Overseer) who delegates work to AI agents organized into rigs.

  Key architectural patterns:
  - MEOW: Molecular Expression of Work (beads → convoys → formulas)
  - GUPP: Universal Propulsion Principle (hooked work = must execute)
  - NDI: Nondeterministic Idempotence (parallel agents, eventual consistency)

  Dolt is the fragile data plane — all beads, mail, and identity flow
  through it. Dolt stability is the #1 operational concern.

  External dependency: steveyegge/beads (Go library for issue tracking).

tags: [multi-agent, cli, infrastructure, orchestration, local-first]
