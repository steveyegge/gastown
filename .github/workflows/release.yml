name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-aarch64-linux-gnu

      - name: Reject replace directives in go.mod
        run: |
          if grep -qE '^replace\s' go.mod; then
            echo "ERROR: go.mod contains replace directives — aborting release."
            echo "Replace directives break 'go install ...@latest'."
            echo "See: https://github.com/steveyegge/gastown/issues/2230"
            grep -n '^replace' go.mod
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >
            release --clean
            ${{ github.repository != 'steveyegge/gastown' && '--skip=publish --skip=announce' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize release channel policy
        if: always()
        run: |
          {
            echo "## Release channel policy"
            echo "- GitHub Releases are the authoritative record for a new Gas Town version."
            echo "- Homebrew follows asynchronously via homebrew-core autobump and may lag behind GitHub Releases."
            echo "- npm is best-effort; \`@gastown/gt\` wraps GitHub release binaries and may lag or be unavailable."
            echo "- Verify the GitHub Release first before debugging downstream channel drift."
          } >> "$GITHUB_STEP_SUMMARY"

  publish-npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: ${{ github.repository == 'steveyegge/gastown' }}
    # npm publish is best-effort — GitHub Releases are authoritative, Homebrew
    # follows asynchronously, and npm is a convenience wrapper around those
    # GitHub release binaries.
    continue-on-error: true
    permissions:
      contents: read
      id-token: write  # OIDC token for npm trusted publishing (no NPM_TOKEN needed)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for provenance support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: |
          cd npm-package
          npm publish --access public --provenance

      - name: Summarize npm expectations
        if: always()
        run: |
          {
            echo "## npm"
            echo "- \`@gastown/gt\` is a downstream wrapper around the GitHub release artifacts."
            echo "- If npm lags, verify the GitHub Release before treating the release as failed."
            echo "- Check npm with: \`npm view @gastown/gt version\`"
          } >> "$GITHUB_STEP_SUMMARY"
