name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Guard: go.mod must not contain replace directives — they break `go install`.
  # See: https://github.com/steveyegge/gastown/issues/2230
  check-no-replace-directives:
    name: Reject go.mod replace directives
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for replace directives in go.mod
        run: ./scripts/ci/verify.sh guard-replace

  # Guard: gastown no longer supports issues.jsonl — Dolt server is the only backend.
  check-no-issues-jsonl:
    name: Reject issues.jsonl
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Reject issues.jsonl if present
        run: ./scripts/ci/verify.sh guard-issues-jsonl

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install ICU4C development headers
        run: sudo apt-get install -y libicu-dev

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@gastown.test"

      - name: Install Dolt
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: ./scripts/ci/verify.sh build

      - name: Test with Coverage
        env:
          GASTOWN_VERIFY_JUNIT_FILE: junit.xml
          GASTOWN_VERIFY_COVERPROFILE: coverage.out
        run: |
          set -o pipefail
          ./scripts/ci/verify.sh unit 2>&1 | tee test-output.txt

      - name: Test Report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 .github/scripts/junit-report.py junit.xml "Unit Test Failures"

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install ICU4C development headers
        run: sudo apt-get install -y libicu-dev

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Lint
        run: ./scripts/ci/verify.sh lint

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install ICU4C development headers
        run: sudo apt-get install -y libicu-dev

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@gastown.test"

      - name: Install Dolt
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash

      - name: Pre-pull Dolt Docker image
        run: docker pull dolthub/dolt-sql-server:1.83.0

      - name: Cache beads (bd)
        id: cache-beads-int
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/go/bin/bd
          key: beads-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install beads (bd)
        if: steps.cache-beads-int.outputs.cache-hit != 'true'
        run: go install github.com/steveyegge/beads/cmd/bd@v0.57.0

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build gt
        run: |
          make build
          cp gt $(go env GOPATH)/bin/

      - name: Add to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Integration Tests
        env:
          GASTOWN_VERIFY_JUNIT_FILE: junit-integration.xml
        run: ./scripts/ci/verify.sh integration

      - name: Test Report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 .github/scripts/junit-report.py junit-integration.xml "Integration Test Failures"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c3 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vuln-check:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4459bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check for known vulnerabilities
        run: govulncheck ./...
