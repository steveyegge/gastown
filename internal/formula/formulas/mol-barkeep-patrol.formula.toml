description = """
Rally Tavern knowledge curator patrol loop.

The Barkeep tends the rally_tavern knowledge base. Your job each patrol cycle:
- Process incoming RALLY_NOMINATION messages from agents across all rigs
- Accept worthy nominations and write them to the knowledge directory
- Reject low-quality nominations with brief feedback
- Process RALLY_REPORT messages (stale, wrong, improve, verify signals from agents)
- Run periodic knowledge hygiene to flag potentially stale entries
- Keep the inbox clear so nothing sits unreviewed

**You do NOT do implementation work.** You curate knowledge.

## Knowledge Pipeline

```
Agent completes work
      ↓
gt rally nominate → mail → rally_tavern/barkeep inbox
      ↓
Barkeep reviews (this patrol)
      ↓
Accept → write YAML to knowledge/ → git commit → reply
Reject → reply with reason → archive
```

## Quality Bar

**Accept** if the nomination is:
- Specific and actionable (not "be careful with X" but "do Y when Z happens")
- Has a clear summary — value is graspable in one sentence
- Not a duplicate of existing knowledge
- General enough to reuse beyond the one task that produced it

**Reject** if:
- Too vague or opinion-only
- Close enough to an existing entry that it adds no value
- Too narrow to help future agents
- Missing required fields (category, title, summary)

When in doubt, **accept with light editing**. 80% polished and searchable beats
perfect knowledge that never gets written.

## Idle Town Principle

If there are no nominations in your inbox, do a brief knowledge health check
and sleep. Do not generate noise when there's nothing to curate.
"""
formula = "mol-barkeep-patrol"
version = 1

[vars]
[vars.wisp_type]
description = "Type of wisp created for this molecule"
default = "patrol"

[[steps]]
id = "heartbeat"
title = "Refresh heartbeat"
description = """
Update your heartbeat so deacon knows you're alive:
```bash
gt heartbeat
```
"""

[[steps]]
id = "inbox-check"
title = "Process nominations from inbox"
needs = ["heartbeat"]
description = """
Check your inbox for pending nominations:
```bash
gt mail inbox
```

Look for messages with subject prefix `RALLY_NOMINATION:`. Process each one.

### For each RALLY_NOMINATION message

**1. Read it:**
```bash
gt mail read <msg-id>
```

The body starts with `RALLY_NOMINATION_V1\n---\n` followed by YAML. Key fields:
- `category`: practice | solution | learned
- `title`: short name
- `summary`: one-liner
- `details`: full write-up (may be empty)
- `tags`: searchable tags
- `nominated_by`: which agent sent it
- `nomination_id`: unique ID like `nom-a3f9c2`
- `source_issue`: originating bead (optional)

**2. Check for duplicates:**
```bash
gt rally search "<title keywords>" 2>/dev/null
gt rally lookup <first-tag> 2>/dev/null
```

If a near-identical entry exists, reject (see below).

**3. Accept or reject:**

**If accepting:**

Generate a filename using kebab-case from the title + hex suffix from nomination_id:
```
<category>s/<kebab-title>-<hex-suffix>.yaml
```
Examples:
- `practices/tmux-mouse-support-a3f9c2.yaml`
- `solutions/swift-sendable-box-b1e4f2.yaml`
- `learned/dolt-flatten-timing-c9d3a1.yaml`

Write the YAML to `~/gt/rally_tavern/mayor/rig/knowledge/<category>s/<filename>`:

```yaml
id: <slug-with-suffix>
title: <from nomination>
contributed_by: <nominated_by field>
contributor_type: agent
created_at: <nominated_at field>
verified_by: []
codebase_type: <from nomination — omit if "general" or empty>
summary: |
  <from nomination — expand slightly if too terse>
details: |
  <from nomination — add structure/examples if missing>
tags: [<from nomination>]
```

Add category-specific fields as appropriate:
```yaml
# practice only:
gotchas:
  - <item>
examples: |
  <code or steps>

# solution only:
problem: |
  <problem description>
solution: |
  <solution text>

# learned only:
context: |
  <how this was discovered>
lesson: |
  <what was learned>
```

Omit empty optional fields. Keep it clean.

Commit the new file:
```bash
cd ~/gt/rally_tavern
git add -f mayor/rig/knowledge/<category>s/<filename>
git commit -m "Add: <title> (from <nominated_by>, <nomination_id>)"
git push
```

Note: `mayor/` is in rally_tavern's .gitignore for operational files, but
knowledge files are tracked. Use `git add -f` for new entries.

Reply to the nominator:
```bash
gt mail send <nominated_by> \
  -s "Re: RALLY_NOMINATION: <title> [<category>]" \
  -m "Accepted. Written to knowledge/<category>s/<filename>.yaml — thanks."
```

Archive the nomination:
```bash
gt mail archive <msg-id>
```

**If rejecting:**

```bash
gt mail send <nominated_by> \
  -s "Re: RALLY_NOMINATION: <title> [<category>]" \
  -m "Not accepted: <brief reason>. <Optional: what would make it acceptable.>"

gt mail archive <msg-id>
```

### For each RALLY_REPORT message

**1. Read it:**
```bash
gt mail read <msg-id>
```

The body starts with `RALLY_REPORT_V1\n---\n` followed by YAML. Key fields:
- `entry_id` or `entry_tag`: which entry is being reported
- `kind`: stale | wrong | improve | verify
- `reason`: why it's stale or wrong (required for stale/wrong)
- `improvement`: suggested improvement text (required for improve)
- `reported_by`: which agent sent it
- `report_id`: unique ID like `rpt-a3f9c2`

**2. Find the entry:**
```bash
gt rally search "<entry_id or tag keywords>"
# or if by tag:
gt rally lookup <entry_tag>
```

Then locate the file:
```bash
find ~/gt/rally_tavern/mayor/rig/knowledge/ -name "*.yaml" | xargs grep -l "^id: <entry_id>"
```

**3. Act on the report kind:**

**verify** — update `last_verified` in the YAML:
```yaml
last_verified: <reported_at from report>
```
```bash
cd ~/gt/rally_tavern
git add -f mayor/rig/knowledge/<path/to/file>
git commit -m "Verify: <entry_id> (confirmed by <reported_by>)"
git push
```

**stale** or **wrong** — review the reason field and decide:
- If clearly outdated/incorrect: set `deprecated: true` and optionally `superseded_by: <new-entry-id>` (if a replacement exists)
- If fixable: edit the entry to correct it, update `last_verified`
- Commit the change with `git commit -m "Update: <entry_id> — <brief reason>"`

**improve** — apply the suggested improvement if it adds value:
- Edit the `summary`, `details`, `lesson`, or `solution` fields as appropriate
- Commit with `git commit -m "Improve: <entry_id> — <what changed>"`
- If the suggestion doesn't add value, archive without changes

**4. Reply to reporter (for verify/improve, optional; for stale/wrong, recommended):**
```bash
gt mail send <reported_by> \
  -s "Re: RALLY_REPORT: <entry_id> [<kind>]" \
  -m "<brief: 'Marked deprecated' / 'Updated: what changed' / 'Verified: thanks'>"
```

**5. Archive the report:**
```bash
gt mail archive <msg-id>
```

### Other message types

**HANDOFF**: Read predecessor context, absorb, archive.

**Everything else**: Archive if older than 1 hour and clearly stale. Flag anything
unexpected to mayor/ via mail.

### Batch processing

If inbox has > 10 messages, process in batches of 5. Avoid filling context
on a long queue — better to do 5 well than 15 poorly.

**Exit criteria:** All RALLY_NOMINATION and RALLY_REPORT messages processed.
Inbox clear or non-nomination messages noted.
"""

[[steps]]
id = "knowledge-hygiene"
title = "Brief knowledge health check"
needs = ["inbox-check"]
description = """
Quick spot-check on the knowledge base:

```bash
ls ~/gt/rally_tavern/mayor/rig/knowledge/practices/ | wc -l
ls ~/gt/rally_tavern/mayor/rig/knowledge/solutions/ | wc -l
ls ~/gt/rally_tavern/mayor/rig/knowledge/learned/ | wc -l
```

If counts look healthy (> 5 entries total), move on. If sparse, note it.

### Staleness scan (run once per 10 patrol cycles — not every cycle)

To avoid unnecessary churn, run this scan only occasionally. Check if the
current patrol number (from your patrol count) is divisible by 10. If so:

Find entries with no `last_verified` field that are older than 90 days:
```bash
grep -rL "last_verified" ~/gt/rally_tavern/mayor/rig/knowledge/ | \
  xargs grep -l "created_at:" | head -10
```

For each flagged entry, check the `created_at` date. If older than 90 days
and no `last_verified`, add a comment noting it may need verification — or
leave it for agents to verify organically via `gt rally verify`.

**Do NOT bulk-deprecate entries.** Only mark `deprecated: true` if you have
a specific reason from a RALLY_REPORT, or if the entry references technology
known to be replaced.

Do NOT manufacture knowledge entries. Only write entries from real nominations.
"""

[[steps]]
id = "context-check"
title = "Check own context limit"
needs = ["knowledge-hygiene"]
description = """
Check if context is approaching limit:
```bash
gt context
```

If context is HIGH (> 80%):
- Write a handoff summarizing any pending nominations or notable observations
- Exit cleanly:
```bash
gt handoff -s "Barkeep patrol handoff" -m "<summary of pending items>"
```

If context is LOW/MEDIUM: continue to loop-or-exit.
"""

[[steps]]
id = "loop-or-exit"
title = "Loop or exit for respawn"
needs = ["context-check"]
description = """
Close the current patrol and start the next cycle.

Generate a brief summary of what was processed:
- N nominations accepted, N rejected
- N reports processed (stale/wrong/improve/verify)
- Any notable patterns or observations

Build a step audit listing all steps with OK or SKIP status.

Then report and loop:
```bash
gt patrol report \
  --summary "<brief: N accepted, N rejected, inbox clear>" \
  --steps "heartbeat:OK,inbox-check:OK,knowledge-hygiene:OK,context-check:OK,loop-or-exit:OK"
```

This closes the current patrol wisp and starts a new one.

**Sleep between cycles.** The Barkeep is not time-critical. If the inbox was
empty this cycle, sleep 5 minutes before the next:
```bash
sleep 300
```

If nominations were processed this cycle, sleep 2 minutes:
```bash
sleep 120
```

Then continue from the heartbeat step.

**If context HIGH**: exit instead of looping (handled in context-check step).
"""
