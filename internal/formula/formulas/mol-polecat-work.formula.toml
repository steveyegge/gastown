# Polecat Work Formula
# 
# This formula defines the molecule structure for polecat work assignments.
# It includes the standard workflow plus health check and completion handling.

[formula]
name = "mol-polecat-work"
description = "Standard polecat work assignment with health checks"

[steps.start]
type = "agent"
agent = "polecat"
prompt = """
You are assigned to work on this issue. Follow the standard Gas Town workflow:

1. Check the issue details and understand the requirements
2. Plan your approach
3. Implement the solution
4. Test your changes
5. Submit for merge queue with `gt done`

Remember to use proper Git practices and follow the issue acceptance criteria.
"""

[steps.health_check]
type = "health_check"
check = "HEALTH_CHECK"

[steps.completion]
type = "completion"
handler = "self_managed"