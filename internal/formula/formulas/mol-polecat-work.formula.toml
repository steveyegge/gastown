description = """
Full polecat work lifecycle from assignment through completion.

This molecule guides a polecat through a complete work assignment. Each step
has clear entry/exit criteria and specific commands to run. A polecat can
crash after any step and resume from the last completed step.

## Polecat Contract (Persistent Model, gt-4ac)

You are a persistent worker with an ephemeral session. You:
1. Receive work via your hook (pinned molecule + issue)
2. Work through molecule steps using `bd mol current` / `bd close <step>`
3. Create a GitHub PR with `gh pr create --base release`
4. Complete via `gt done` (transition to IDLE)
5. The scheduler reuses you for the next assignment

**Persistent model:** When you run `gt done`, you push your work and transition
to IDLE. Your sandbox is preserved for reuse. The scheduler assigns you new work
automatically. The Refinery reviews and merges your PR independently.

**Important:** This formula defines the template. Your molecule already has step
beads created from it. Use `gt hook` to find your pinned molecule, then `bd show`
for step details — do NOT read this file directly.

**You MUST:**
- Create a GitHub PR before running gt done (gt done will FAIL without one)

**You do NOT:**
- Run gt done without a PR (it will be rejected)
- Push directly to main or release (Refinery merges your PR)
- Close your own issue (Refinery closes after merge)
- Wait for merge (you transition to idle after `gt done`)
- Use `gt mq submit` (deprecated — use `gh pr create` + `gt done` instead)
- Revert changes on {{base_branch}} that aren't yours (preserve hotfixes)

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | hook_bead | The issue ID you're assigned to work on |
| base_branch | sling vars | The base branch to rebase on (default: release) |
| setup_command | rig config | Setup/install command (e.g., `pnpm install`). Empty = skip. |
| typecheck_command | rig config | Type check command (e.g., `tsc --noEmit`). Empty = skip. |
| test_command | rig config | Test command (default: `go test ./...`) |
| lint_command | rig config | Lint command (e.g., `eslint .`). Empty = skip. |
| build_command | rig config | Build command (e.g., `go build ./...`). Empty = skip. |

## Failure Modes

| Situation | Action |
|-----------|--------|
| Tests fail | Fix them. Do not proceed with failures. |
| Blocked on external | Mail Witness for help, mark yourself stuck |
| Context filling | Use gt handoff to cycle to fresh session |
| Unsure what to do | Mail Witness, don't guess |"""
formula = "mol-polecat-work"
version = 10

[compose]
aspects = ["memory-context"]

[[steps]]
id = "load-context"
title = "Load context and verify assignment"
description = """
Initialize your session and understand your assignment.

**1. Prime your environment:**
```bash
gt prime                    # Load role context
bd prime                    # Load beads context
```

**2. Preflight check (validate connectivity):**
```bash
gt hook               # Shows your pinned molecule and hook_bead
bd show {{issue}}           # Validates Dolt connectivity + reads your assignment
```
If `bd show` hangs or fails: run `gt dolt status` to check Dolt health.
If Dolt is down: `gt escalate -s HIGH "Dolt: <symptom>"` — do NOT restart it yourself.

The hook_bead is your assigned issue. Read the output of `bd show` carefully.

**3. Check inbox for additional context:**
```bash
gt mail inbox
# Read any HANDOFF or assignment messages
```

**4. Understand the requirements:**
- What exactly needs to be done?
- What files are likely involved?
- Are there dependencies or blockers?
- What does "done" look like?

**5. Query CASS memory for prior context (if cm available):**
```bash
# Get relevant rules and past solutions for your task
CM_RESULT=$(cm context "$(bd show {{issue}} --json | jq -r .title)" --json 2>/dev/null) || true
if [ -n "$CM_RESULT" ]; then
  echo "$CM_RESULT" | jq -r '.data.relevantBullets[]?.content // empty' | head -5
  # Persist rule IDs to file so they survive across step boundaries
  RULE_IDS=$(echo "$CM_RESULT" | jq -r '[.data.relevantBullets[]?.id // empty] | join(",")' 2>/dev/null)
  echo "$RULE_IDS" > /tmp/cass-rules-{{issue}}.txt
fi
```
Review any surfaced rules — they're lessons from prior sessions that may help.

**6. Set bead status to in_progress:**
```bash
bd update {{issue}} --status=in_progress
```
This makes active work visible on kanban pipeline views immediately.

**7. Verify you can proceed:**
- No unresolved blockers on the issue
- You understand what to do
- Required resources are available

**CRITICAL — WRONG BEAD GUARD:**
Your assigned bead is **{{issue}}** and ONLY {{issue}}. Do NOT close, work on,
or claim completion of ANY other bead. If you see similar work already on main,
that is a DIFFERENT bead — not yours. You must implement {{issue}} from scratch.
Never fabricate commit hashes or claim work is "already done" without verifying
the EXACT bead ID {{issue}} in the commit message.

If blocked or unclear, mail Witness immediately:
```bash
gt mail send <rig>/witness -s "HELP: Unclear requirements" -m "Issue: {{issue}}
Question: <what you need clarified>"
```

**Exit criteria:** You understand the work and can begin implementation."""

[[steps]]
id = "branch-setup"
title = "Set up working branch"
needs = ["load-context"]
description = """
Ensure you're on a clean feature branch ready for work.

**1. Check current branch state:**
```bash
git status
git branch --show-current
```

**2. Check for a prior branch from a rejected MR:**

If the bead notes contain "MERGE REJECTION" with a branch name, check if that
branch still exists on the remote. Reusing it preserves all previous work:
```bash
git fetch origin
# Check for prior branch
git branch -r | grep <prior-branch>
# If found, check it out:
git checkout -b <prior-branch> origin/<prior-branch>
git rebase origin/{{base_branch}}
```

**If no prior branch, create a fresh one:**
```bash
git fetch origin
git checkout -b polecat/<name> origin/{{base_branch}}
```

**3. Ensure clean working state:**
```bash
git status                  # Should show "working tree clean"
git stash list              # Should be empty
```

If dirty state from previous work:
```bash
# If changes are relevant to this issue:
git add -A && git commit -m "WIP: <description>"

# If changes are unrelated cruft:
git stash push -m "unrelated changes before {{issue}}"
# Or discard if truly garbage:
git checkout -- .
```

**4. Sync with {{base_branch}}:**
```bash
git fetch origin
git rebase origin/{{base_branch}}      # Get latest, rebase your branch
```

If rebase conflicts:
- Resolve them carefully
- Test after resolution
- If stuck, mail Witness

**5. Run project setup (if configured):**

If setup_command is set, run it to install dependencies:
```bash
{{setup_command}}
```

This ensures dependencies are installed before pre-flight checks.
Empty setup_command means "not configured" — skip this step.

**Exit criteria:** You're on a clean feature branch, rebased on latest {{base_branch}}, dependencies installed."""

[[steps]]
id = "preflight-tests"
title = "Verify pre-flights pass on base branch"
needs = ["branch-setup"]
description = """
Check if the codebase is healthy BEFORE starting your work.

**The Scotty Principle:** Don't walk past a broken warp core. But also don't
let someone else's mess consume your entire mission.

**1. Run pre-flights on {{base_branch}}:**

Your branch was just created from or rebased on `origin/{{base_branch}}` with no
implementation changes yet — you're already at the base branch state.

Run each configured check, then tests:

If typecheck_command is set: `{{typecheck_command}}`
If lint_command is set: `{{lint_command}}`
If test_command is set: `{{test_command}}`

```bash
{{typecheck_command}}       # Check for type errors (if command set)
{{lint_command}}            # Check for lint errors (if command set)
{{test_command}}            # Run tests (if command set)
```

Empty commands mean "not configured" — skip silently.

**2. If pre-flights pass:**

Continue to implement step.

**3. If pre-flights fail on {{base_branch}}:**

File a bead and proceed. Do NOT fix pre-existing failures yourself — that is
not your assignment. Your job is to fix the issue on your hook, not {{base_branch}}.

| Situation | Action |
|-----------|--------|
| Any pre-existing failure | File bead, proceed with your work |

FORBIDDEN: Pushing to {{base_branch}}. FORBIDDEN: Fixing pre-existing failures.
You work on YOUR feature branch only. `gt done` handles push/MR.

**File and proceed path:**
```bash
bd create --title "Pre-existing failure: <description>" \
  --type bug --priority 1

gt mail send <rig>/witness -s "NOTICE: {{base_branch}} has failing pre-flights" \
  -m "Found pre-existing failures on {{base_branch}}.
Filed: <bead-id>
Proceeding with my assigned work ({{issue}})."
```

**Context consideration:**
If investigating pre-existing failures consumed significant context:
```bash
gt handoff -s "Investigated pre-existing failures, ready for assigned work" \
  -m "Issue: {{issue}}
Found: <what failed>
Ready to start: implement step"
```
Fresh session continues from implement.

**Exit criteria:** Pre-flights pass on {{base_branch}} (or issue filed), ready to implement."""

[[steps]]
id = "implement"
title = "Implement the solution"
needs = ["preflight-tests"]
description = """
Do the actual implementation work. **Push after every commit.**

**Working principles:**
- Follow existing codebase conventions
- Make atomic, focused commits
- Keep changes scoped to the assigned issue
- Don't gold-plate or scope-creep
- When you modify a model, schema, or service interface, find ALL existing test
  mocks and fixtures that reference changed fields. Update them BEFORE running
  tests. Do NOT assume existing tests will pass without changes.
- **Scope is a contract.** The bead description defines what you build. If you believe \
the issue requires work beyond what is described, mail the mayor BEFORE implementing it:
  ```bash
  gt mail send mayor/ -s "Scope question: {{issue}}" -m "I think we also need X because Y. Proceed?"
  ```
  Wait for a response before expanding scope. Do NOT build unrequested features and \
present them as complete.
- **NEVER run `sudo` or install system packages** (apt, dnf, yum, pacman, brew install,
  pip install --system, npm install -g). Use the tools already in your workspace.
  If a dependency is missing, file a bead — do not modify the host OS.

**Commit and push frequently:**
```bash
# After each logical unit of work:
git add <files>
git commit -m "<type>: <description> ({{issue}})"
git push
```

**PUSH RULE (CRITICAL):** Every `git commit` MUST be immediately followed by
`git push`. A partial implementation on remote is infinitely better than
complete work lost when your session dies. Never accumulate unpushed commits.

Commit types: feat, fix, refactor, test, docs, chore

**Discovered work:**
If you find bugs or improvements outside your scope:
```bash
bd create --title "Found: <description>" --type bug --priority 2
# Note the ID, continue with your work
```

Do NOT fix unrelated issues in this branch.

**CASS harmful feedback:**
If a CASS rule led you down the wrong path during implementation, mark it immediately:
```bash
cm mark <bulletId> --harmful --reason "description of how it misled"
```
Do NOT blindly mark all rules harmful — only rules you explicitly identify as misleading.
For example: a rule that told you to use a pattern that caused test failures, or a rule
whose advice contradicts the actual codebase conventions.

**If stuck:**
Don't spin for more than 15 minutes. Push what you have, then mail Witness:
```bash
gt mail send <rig>/witness -s "HELP: Stuck on implementation" -m "Issue: {{issue}}
Trying to: <what you're attempting>
Problem: <what's blocking you>
Tried: <what you've attempted>"
```

**Exit criteria:** Implementation complete, all changes committed AND pushed."""

[[steps]]
id = "self-review"
title = "Self-review changes"
needs = ["implement"]
description = """
Review your own changes before running tests.

**1. Review the diff:**
```bash
git diff origin/{{base_branch}}...HEAD     # All changes vs {{base_branch}}
git log --oneline origin/{{base_branch}}..HEAD  # All commits
```

**2. Check for common issues (CEO review patterns):**

| Category | Look For |
|----------|----------|
| Scope | Only files relevant to {{issue}} should appear |
| Bugs | Off-by-one, null handling, edge cases |
| Security | Injection, auth bypass, exposed secrets, unsanitized input |
| Wiring | New deps added but not imported, config defined but not loaded |
| Style | Naming, formatting, code organization |
| Completeness | Missing error handling, incomplete code paths |
| Cruft | Debug prints, commented code, TODOs, console.log |
| Test quality | Weak assertions (assertTrue(true)), over-mocked tests that can't fail |

**3. Fix issues found:**
Don't just note them - fix them now. Amend or add commits as needed.

**4. Verify no unintended changes:**
```bash
git diff --stat origin/{{base_branch}}...HEAD
# Only files relevant to {{issue}} should appear
```

If you accidentally modified unrelated files, remove those changes.

**Exit criteria:** Changes are clean, reviewed, and ready for testing."""

[[steps]]
id = "verify-acceptance"
title = "Verify implementation meets acceptance criteria"
needs = ["self-review"]
description = """
**MANDATORY: Verify your work delivers what the bead requires.**

This step exists because polecats have historically closed beads without
meeting acceptance criteria. Do NOT skip this step.

**1. Re-read the bead description:**
```bash
bd show {{issue}}
```

**2. For each requirement in the description, verify your implementation:**

Go through the bead description line by line. For each stated requirement:
- Check your diff: `git diff origin/{{base_branch}}...HEAD`
- Confirm the requirement is DELIVERED in your code
- If you chose a DIFFERENT approach than prescribed, document WHY in your
  PR description (next steps). A different approach is acceptable IF justified.
- If a requirement is NOT delivered (e.g., out of scope, cross-rig change),
  note it explicitly — do NOT silently skip it.

**3. Score each requirement:**

| Requirement | Status |
|-------------|--------|
| <requirement 1> | DELIVERED / ALTERNATIVE_APPROACH / NOT_DELIVERED |
| <requirement 2> | DELIVERED / ALTERNATIVE_APPROACH / NOT_DELIVERED |

**4. If any requirement is NOT_DELIVERED without justification:**
Go back to the implement step and finish the work.

**5. If you chose an alternative approach:**
Add a note to the bead explaining why:
```bash
bd update {{issue}} --notes "Alternative approach for <requirement>: <reason>"
```

**CRITICAL:** Do NOT close a bead or proceed to gt done if the core
deliverable does not exist in your code. A proxy, stub, or comment
rename is NOT a delivery.

**Exit criteria:** Every requirement in the bead has a corresponding
code change, or an explicit documented justification for deviation."""

[[steps]]
id = "run-tests"
title = "Run quality checks and tests"
needs = ["verify-acceptance"]
description = """
Verify your changes don't break anything and are properly tested.

**1. Run the unified validation target:**

If a `validate` script exists (e.g., `npm run validate`), run it — this is the
single source of truth for all quality checks, matching what CI runs:
```bash
npm run validate            # typecheck + lint + test + build + coverage gate + bundle size
```

If no validate script exists, fall back to individual commands:
```bash
{{setup_command}}           # Install dependencies (if configured)
{{typecheck_command}}       # Type check (if configured)
{{lint_command}}            # Lint (if configured)
{{test_command}}            # Tests (if configured)
{{build_command}}           # Build (if configured)
```

**2. If typecheck or build fails: you MUST fix it before proceeding.**
Typecheck and build failures are BLOCKING — do NOT create a PR with type errors.
This is non-negotiable regardless of whether your change caused the failure.

- If your change caused it: fix it. Return to implement step if needed.
- If pre-existing on the base branch: fix it anyway. CI will reject it,
  the revert pipeline will revert it, and the bead will be re-dispatched.

**3. ALL TESTS MUST PASS.** Do not proceed with failures.

If tests fail, determine if your change caused it:
- If yes: Fix it. Return to implement step if needed.
- If pre-existing: File a bead, but your PR must still pass.

**4. Update existing test mocks and fixtures:**
If you modified models, schemas, or interfaces, update ALL existing mocks
and fixtures BEFORE running tests. Do NOT assume existing tests pass unchanged.

**5. Verify test coverage for new code (AUTOMATED GATE):**

This is enforced automatically by `npm run validate` (which runs the test
coverage gate script). But you MUST also write the tests yourself:

| What you added | Required tests |
|----------------|---------------|
| New .ts/.vue file | Corresponding .test.ts file |
| New function/component | Unit tests (happy + error path) |
| New view/route | E2e or integration tests |
| Bug fix | Regression test proving the fix |

Files that do NOT require tests (auto-excluded by coverage gate):
- Type definitions (.d.ts)
- Entry points (main.ts, router/index.ts)
- Config files, constants

**Automated enforcement:** The coverage gate checks that every changed source
file has a corresponding test file. If tests are missing, the gate fails and
you cannot proceed.

```bash
# Verify manually if needed:
git diff --name-only --diff-filter=A origin/{{base_branch}}...HEAD
# For each new .ts or .vue file, a .test.ts counterpart MUST exist
```

**Exit criteria:** All quality checks pass, all tests pass, every new file has corresponding tests."""

[[steps]]
id = "visual-smoke-test"
title = "Visual smoke test (frontend changes only)"
needs = ["run-tests"]
description = """
**CONDITIONAL**: Only run this step if changes touch `src/` or `server/`.

Check whether this step applies:
```bash
CHANGED_FILES=$(git diff --name-only origin/{{base_branch}}...HEAD)
echo "$CHANGED_FILES" | grep -qE '^(src/|server/)' || { echo "SKIP: No frontend/server changes"; exit 0; }
```

If no `src/` or `server/` files changed, skip this step entirely and proceed to commit-changes.

**1. Start dev servers:**
```bash
# Start backend
npx tsx server/index.ts &
SERVER_PID=$!

# Start frontend
npx vite --port 5173 &
VITE_PID=$!

# Wait for servers to be ready (max 30s each)
for i in $(seq 1 30); do curl -s http://localhost:3737/api/sources >/dev/null 2>&1 && break; sleep 1; done
for i in $(seq 1 30); do curl -s http://localhost:5173/ >/dev/null 2>&1 && break; sleep 1; done
```

**2. Run visual smoke checks:**

```bash
BROWSE=~/.claude/skills/gstack/browse/dist/browse

# Check Kanban view loads
$BROWSE goto http://localhost:5173/kanban
KANBAN_STATUS=$?
if [ $KANBAN_STATUS -ne 0 ]; then echo "FAIL: Kanban page failed to load"; fi

# Check List view loads and table renders
$BROWSE goto http://localhost:5173/list
LIST_STATUS=$?
if [ $LIST_STATUS -ne 0 ]; then echo "FAIL: List page failed to load"; fi

# Verify key DOM elements exist
$BROWSE js "!!document.querySelector('.kanban-view, .pipeline-view, [class*=kanban]')" || true
$BROWSE js "!!document.querySelector('table, .list-view, [class*=list]')" || true

# Check for console errors (JS exceptions, failed network requests)
CONSOLE_OUTPUT=$($BROWSE console)
echo "$CONSOLE_OUTPUT"
if echo "$CONSOLE_OUTPUT" | grep -qi "error"; then
  echo "FAIL: Console errors detected"
  CONSOLE_ERRORS=1
else
  CONSOLE_ERRORS=0
fi
```

**3. Kill dev servers:**
```bash
kill $SERVER_PID $VITE_PID 2>/dev/null || true
wait $SERVER_PID $VITE_PID 2>/dev/null || true
```

**4. Evaluate results:**

If ANY check failed (page load failure or console errors):
- Do NOT proceed. Return to implement step and fix the issue.
- Common failures: missing imports, broken routes, runtime TypeScript errors.

If all checks passed: proceed to commit-changes.

**Exit criteria:** Kanban and List views load without errors, no console errors detected. Or: step skipped because no src/ or server/ files changed."""

[[steps]]
id = "commit-changes"
title = "Commit all implementation changes"
needs = ["visual-smoke-test"]
description = """
Ensure ALL implementation work is committed before cleanup.

**CRITICAL: You MUST commit all changes from implementation.**
NEVER use `git checkout -- .` or `git restore .` to discard implementation work.
ALWAYS commit ALL uncommitted changes from your implementation.

**1. Check for uncommitted changes:**
```bash
git status
```

**2. If there are ANY uncommitted changes, commit them now:**
```bash
git add -A && git commit -m "<type>: <descriptive message> ({{issue}})"
```

**3. If working tree is already clean, skip.**

**4. VERIFY:**
```bash
git status
```
Must show "nothing to commit, working tree clean".

**5. Verify you have commits:**
```bash
git log origin/{{base_branch}}..HEAD --oneline
```
If you made changes during implementation, this MUST show at least 1 commit.

**Exit criteria:** All changes committed. Working tree clean."""

[[steps]]
id = "cleanup-workspace"
title = "Clean up workspace"
needs = ["commit-changes"]
description = """
Ensure workspace is pristine before handoff.

**IMPORTANT: Do NOT run `git push`. That is `gt done`'s job (next step).**
**IMPORTANT: Do NOT discard implementation changes. They must already be committed.**

**1. Check for untracked files:**
```bash
git status --porcelain
```
Should be empty. If not:
- Add to .gitignore if appropriate
- Remove if temporary: `rm <file>`
- Commit if needed: `git add <file> && git commit -m "chore: add <file>"`

**2. Check stash:**
```bash
git stash list
```
Should be empty. If not:
- Pop and commit: `git stash pop && git add -A && git commit -m "chore: unstash work ({{issue}})"`
- Or drop if truly garbage: `git stash drop`

**3. Verify clean state and commits:**
```bash
git status                  # Must show "working tree clean"
git stash list              # Must be empty
git log origin/{{base_branch}}..HEAD   # Your commits (should show your work)
```

If `git log origin/{{base_branch}}..HEAD` shows nothing but you DID make changes,
something went wrong. Do NOT proceed — mail Witness for help.

**Exit criteria:** Workspace clean, no cruft, all work committed. Do NOT push — `gt done` handles that."""

[[steps]]
id = "prepare-for-review"
title = "Prepare work for review"
needs = ["cleanup-workspace"]
description = """
Verify work is complete and ready for merge queue.

**Note:** Do NOT close the issue. The Refinery will close it after successful merge.
This enables conflict-resolution retries without reopening closed issues.

**1. Verify the issue shows your work:**
```bash
bd show {{issue}}
# Status should still be 'in_progress' (you're working on it)
```

**2. Add completion notes:**
```bash
bd update {{issue}} --notes "Implemented: <brief summary of what was done>"
```

**3. Sync beads:**
```bash
bd sync
```

**Exit criteria:** Issue updated with completion notes, beads synced."""

[[steps]]
id = "final-rebase"
title = "Rebase on latest base branch before submit"
needs = ["prepare-for-review"]
description = """
Rebase on the latest base branch to catch conflicts BEFORE they reach the Refinery.
This prevents silent reverts of changes that landed on {{base_branch}} while you worked.

**1. Fetch latest and rebase:**
```bash
git fetch origin
git rebase origin/{{base_branch}}
```

**2. If rebase succeeds (no conflicts):**
Force-push the rebased branch (history changed):
```bash
git push -f
```

**3. If rebase has conflicts:**
YOU resolve them — you have full context of your work and know what you changed.

**Resolution principle:** For any code outside YOUR assigned issue, **keep the base
branch version**. Only preserve YOUR changes for lines that are part of {{issue}}.
The base branch may contain hotfixes from the Mayor or other merged work that
must not be reverted.

```bash
# For each conflicted file:
git status                 # See conflicted files
# Edit to resolve — favor base branch for code you didn't write
git add <resolved-file>
git rebase --continue
```

After resolution:
```bash
{{test_command}}           # Re-run tests to verify resolution
git push -f
```

**4. If truly stuck on a conflict:**
```bash
git rebase --abort
gt mail send <rig>/witness -s "HELP: Conflict on final rebase" \
  -m "Issue: {{issue}}
Branch: $(git branch --show-current)
Cannot resolve conflict with origin/{{base_branch}}"
```

**Exit criteria:** Branch rebased on latest {{base_branch}}, force-pushed."""

[[steps]]
id = "create-pr"
title = "MANDATORY: Create GitHub Pull Request"
needs = ["final-rebase"]
description = """
**⚠️ MANDATORY STEP — DO NOT SKIP. gt done WILL FAIL WITHOUT A PR. ⚠️**

Create a GitHub PR for your work. ALL work goes through PR review. There are NO exceptions.

**1. Generate PR title and body:**
The PR title should follow conventional commit format: `<type>: <description> ({{issue}})`

**2. Create the PR:**
```bash
gh pr create \
  --title "<type>: <description> ({{issue}})" \
  --body "$(cat <<'EOF'
## Summary
<1-3 bullet points describing what was done and why>

## Changes
<list of key files/areas changed>

## Test plan
<how this was tested, what passed>

Issue: {{issue}}

🤖 Generated with [Claude Code](https://claude.com/claude-code)
EOF
)" \
  --base {{base_branch}}
```

**3. Record the PR URL:**
```bash
PR_URL=$(gh pr view --json url -q .url)
echo "PR created: $PR_URL"
```

The PR URL will be captured by `gt done` and stored on the MR bead for the
review agent and refinery to reference.

**4. Set bead status to in_review:**
```bash
bd update {{issue}} --status=in_review
```

This makes the PR review stage visible in kanban pipeline views and bead queries.

**IMPORTANT:** Do NOT request reviewers or merge the PR yourself. The Witness
will trigger a review agent, and the Refinery will merge after approval.

**Exit criteria:** GitHub PR created, URL available, bead status set to in_review."""

[[steps]]
id = "submit-and-exit"
title = "Submit work and transition to idle"
needs = ["create-pr"]
description = """
Submit your work and transition to IDLE. The scheduler assigns you new work.

**⚠️ PREREQUISITE: You MUST have created a GitHub PR in the previous step.
gt done will REJECT your submission if no open PR exists for your branch.
If you skipped create-pr, go back and create the PR NOW before proceeding. ⚠️**

**Persistent Polecat Model (gt-4ac):**
Once you run `gt done`, you transition to IDLE. The command:
1. Validates an open GitHub PR exists (FAILS if missing)
2. Notifies the Witness your PR is ready for review and merge
3. Transitions you to IDLE (sandbox preserved for reuse)
4. The scheduler assigns you new work when available

**Record session outcome for CASS memory (if cm available):**

Determine the outcome BEFORE recording. If you hit repeated errors, escalated,
or are exiting with failure status, record failure instead of success.

```bash
# Read persisted rule IDs from load-context step
RULE_IDS=""
if [ -f /tmp/cass-rules-{{issue}}.txt ]; then
  RULE_IDS=$(cat /tmp/cass-rules-{{issue}}.txt)
fi

# Determine outcome: "success" if work completed cleanly, "failure" if not
# Set OUTCOME="failure" if: tests failed repeatedly, you escalated,
# you're exiting with --status=ESCALATED, or work was not deliverable
OUTCOME="success"

if [ "$OUTCOME" = "success" ]; then
  # Mark each surfaced rule as helpful (they contributed to success)
  if [ -n "$RULE_IDS" ]; then
    IFS=',' read -ra RULE_ARRAY <<< "$RULE_IDS"
    for rid in "${RULE_ARRAY[@]}"; do
      [ -n "$rid" ] && cm mark "$rid" --helpful 2>/dev/null || true
    done
  fi
  cm outcome success "$RULE_IDS" --json 2>/dev/null || true
else
  # Record failure — do NOT mark all rules harmful automatically.
  # Only mark specific rules harmful if they actively misled you:
  # cm mark <bulletId> --harmful --reason "why it misled" 2>/dev/null || true
  cm outcome failure "$RULE_IDS" --json 2>/dev/null || true
fi

# Clean up temp file
rm -f /tmp/cass-rules-{{issue}}.txt
```

**Run gt done:**
```bash
gt done
```

You should see output like:
```
✓ PR submitted for review
  Source: polecat/<name>
  Target: {{base_branch}}
  Issue: {{issue}}
  PR: <github-pr-url>
✓ Sandbox preserved for reuse (persistent polecat)
```

**What happens next:**
- You transition to IDLE, sandbox preserved
- The scheduler assigns you new work when available
- Witness triggers a review agent on your PR
- Review agent approves or requests changes
- If approved: Refinery approves (`gh pr review --approve`) and merges (`gh pr merge --rebase --delete-branch`)
- If rejected: A rework polecat is slung to address feedback
- Refinery sets the work bead to in_pipeline after merge

**Exit criteria:** Work submitted, polecat transitioned to idle."""

[vars]
[vars.issue]
description = "The issue ID assigned to this polecat"
required = true

[vars.base_branch]
description = "The base branch to rebase on and compare against (e.g., release, integration/epic-id)"
default = "release"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.test_command]
description = "Command to run tests (auto-detected from rig settings)"
default = "go test ./..."

[vars.lint_command]
description = "Command to run linting. Empty = skip."
default = ""

[vars.build_command]
description = "Command to run build. Empty = skip."
default = ""
