  # ── Observability stack ──────────────────────────────────────────────────────

  vector:
    image: timberio/vector:latest-alpine
    container_name: gastown-vector
    volumes:
      - ./observability/vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"]
    ports:
      - "8686:8686"   # Vector API
      - "4317:4317"   # OTLP gRPC ingest (from otel-collector)
    depends_on:
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: gastown-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-gastown}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-gastown}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-gastown}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./observability/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  grafana:
    image: grafana/grafana:latest
    container_name: gastown-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-gastown}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - clickhouse

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: gastown-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
