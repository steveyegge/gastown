      GT_OO_AUTH: ${GT_OO_AUTH:-cm9vdEBleGFtcGxlLmNvbTpDb21wbGV4cGFzcyMxMjM=}
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
